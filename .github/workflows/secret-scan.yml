name: Secret scan (gitleaks)

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # 每週一 01:00 UTC = 09:00 Asia/Taipei
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0          # 排程要掃全歷史,必須抓完整 history
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # organization 帳號才需要 GITLEAKS_LICENSE;personal repo 留空即可
